<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitnessApp • MediaPipe Pose Landmarker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand"><div class="logo"></div>
        <div>
          <h1>FitnessApp</h1>
          <p class="subtitle">Client‑side MediaPipe Pose Landmarker</p>
        </div>
      </div>
    </header>
    <main class="app-main">
      <div class="video-panel">
        <div class="video-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="startBtn">Start Camera</button>
          <button class="secondary" id="flipBtn">Flip Camera</button>
          <span class="select" id="cameraWrapper">
            Camera:
            <select id="cameraSelect"></select>
          </span>
        </div>
      </div>
      <aside class="info-panel">
        <div class="chips">
          <div class="chip">Backend<strong>WebGL</strong></div>
          <div class="chip">Resolution<strong>Auto</strong></div>
          <div class="chip" id="chipModel">Model<strong>Lite</strong></div>
        </div>
        <div class="card grid">
          <div id="fps"><strong>FPS:</strong> –</div>
          <div id="poseScore"><strong>Pose score:</strong> –</div>
          <div id="reps"><strong>Reps:</strong> 0</div>
        </div>
        <div class="card tips">
          <h3>Live Tips</h3>
          <ul id="tipsList"></ul>
        </div>
      </aside>
    </main>
    <footer class="app-footer"><small>Client‑side inference. For mobile, use HTTPS.</small></footer>
    <script type="module" src="./pose_landmarker.js"></script>
  </body>
 </html>
