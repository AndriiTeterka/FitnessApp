<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitnessApp • Web (TF Server)</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand"><div class="logo"></div>
        <div>
          <h1>FitnessApp</h1>
          <p class="subtitle">Server-side MoveNet (TF Hub)</p>
        </div>
      </div>
      <nav class="tabs">
        <a class="tab active" href="/">Server</a>
        <a class="tab" href="/tfjs">Client</a>
      </nav>
    </header>
    <main class="app-main">
      <div class="video-panel">
        <div class="video-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="startBtn">Start Camera</button>
          <button class="secondary" id="screenshotBtn">Screenshot</button>
          <label class="threshold">
            Confidence: <input id="confRange" type="range" min="0" max="1" step="0.05" value="0.3" />
            <span id="confVal">0.30</span>
          </label>
        </div>
      </div>
      <aside class="info-panel">
        <div class="chips">
          <div class="chip">Backend<strong>Server TF</strong></div>
          <div class="chip">Resolution<strong>256×256</strong></div>
          <div class="chip" id="chipModel">Model<strong>Thunder</strong></div>
        </div>

        <div class="card grid">
          <div id="fps"><strong>FPS:</strong> –</div>
          <div id="poseScore"><strong>Pose score:</strong> –</div>
          <div id="reps"><strong>Reps:</strong> 0</div>
        </div>

        <div class="card tips">
          <h3>Live Tips</h3>
          <ul id="tipsList"></ul>
        </div>
      </aside>
    </main>
    <footer class="app-footer">
      <small>Note: This demo sends frames to localhost for inference.</small>
    </footer>

    <script type="module" src="/static/main.js"></script>
  </body>
 </html>
