<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitnessApp • TF.js (Client‑side)</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.14.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.14.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@latest/dist/pose-detection.min.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand"><div class="logo"></div>
        <div>
          <h1>FitnessApp</h1>
          <p class="subtitle">Client‑side MoveNet (TF.js)</p>
        </div>
      </div>
      <nav class="tabs">
        <a class="tab" href="./index.html">Client (Alt)</a>
        <a class="tab active" href="./tfjs.html">Client (TF.js)</a>
      </nav>
    </header>
    <main class="app-main">
      <div class="video-panel">
        <div class="video-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="controls">
          <button id="startBtn">Start Camera</button>
          <button class="secondary" id="screenshotBtn">Screenshot</button>
          <span class="select">
            Model: 
            <select id="modelType">
              <option value="Lightning" selected>Lightning</option>
              <option value="Thunder">Thunder</option>
            </select>
          </span>
          <label class="threshold">
            Confidence: <input id="confRange" type="range" min="0" max="1" step="0.05" value="0.3" />
            <span id="confVal">0.30</span>
          </label>
        </div>
      </div>
      <aside class="info-panel">
        <div class="chips">
          <div class="chip">Backend<strong>WebGL</strong></div>
          <div class="chip">Resolution<strong>Auto</strong></div>
          <div class="chip" id="chipModel">Model<strong>Lightning</strong></div>
        </div>

        <div class="card grid">
          <div id="fps"><strong>FPS:</strong> –</div>
          <div id="poseScore"><strong>Pose score:</strong> –</div>
          <div id="reps"><strong>Reps:</strong> 0</div>
        </div>

        <div class="card tips">
          <h3>Live Tips</h3>
          <ul id="tipsList"></ul>
        </div>
      </aside>
    </main>
    <footer class="app-footer"><small>Client‑side inference. For mobile, use HTTPS.</small></footer>
    <script type="module" src="./tfjs.js"></script>
  </body>
 </html>
